<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>learnfromcher.com — Production Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --teal:#1A7A8A; --teal-dk:#0F5A67; --teal-md:#2A9BAD; --teal-lt:#EBF6F8;
  --dark:#1A2E35; --mid:#4A5568; --light:#718096; --off:#F7FAFC; --white:#fff; --border:#CBD5E0;
  --cher-c:#1A7A8A; --cher-c-lt:#EBF6F8; --cher-c-dk:#0F5A67;
  --cher-h:#7C6FAB; --cher-h-lt:#FAF5FF; --cher-h-dk:#5A4F8A;
  --cher-e:#F48FB1; --cher-e-lt:#FFF0F5; --cher-e-dk:#C2185B;
  --cher-r:#FDE68A; --cher-r-lt:#FFFBEB; --cher-r-dk:#92400E;
  --green:#276749; --green-lt:#F0FFF4; --green-bd:#C6F6D5;
  --amber:#B45309; --amber-lt:#FFFBEB; --amber-bd:#FDE68A;
  --red:#C53030; --red-lt:#FFF5F5;
  --coral:#E8604C;
  --cc-accent:#C05621;
  --cc-accent-lt:#FFF7ED;
  --cc-accent-bd:#FDBA74;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F0F4F8;color:var(--dark);min-height:100vh;}

/* ── HEADER ── */
.hdr{background:var(--dark);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.35);}
.hdr-logo{font-size:19px;font-weight:800;letter-spacing:-.3px;}
.hdr-logo span.t{color:var(--teal);}
.hdr-logo span.w{color:#fff;}
.hdr-right{display:flex;align-items:center;gap:14px;}
.hdr-badge{background:rgba(26,122,138,.25);border:1px solid rgba(26,122,138,.5);color:var(--teal-lt);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.4px;}
.hdr-guide-btn{background:rgba(253,230,138,.15);border:1px solid rgba(253,230,138,.4);color:#FDE68A;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.3px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.hdr-guide-btn:hover{background:rgba(253,230,138,.25);}
.progress-summary{font-size:12px;color:#90CDF4;font-family:'DM Mono',monospace;}

/* ── LOGO GUIDE MODAL ── */
.logo-modal-overlay{position:fixed;inset:0;background:rgba(15,30,40,.75);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.logo-modal{background:var(--white);border-radius:16px;width:100%;max-width:780px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.45);}
.logo-modal-hdr{background:var(--dark);border-radius:16px 16px 0 0;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo-modal-hdr h2{color:#FDE68A;font-size:16px;font-weight:800;}
.logo-modal-hdr p{color:#90CDF4;font-size:12px;font-family:'DM Mono',monospace;margin-top:3px;}
.logo-modal-body{padding:22px 24px;overflow-y:auto;flex:1;}
.logo-modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;flex-shrink:0;}
.close-logo-btn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:9px 22px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.close-logo-btn:hover{background:var(--teal-dk);}

/* logo guide content */
.step-block{display:flex;gap:14px;margin:12px 0;align-items:flex-start;}
.step-num{background:var(--teal);color:#fff;width:28px;height:28px;border-radius:50%;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.step-content{flex:1;}
.step-content strong{font-size:14px;color:var(--dark);display:block;margin-bottom:4px;}
.step-content p{font-size:13px;color:var(--mid);line-height:1.55;}
.step-content code{font-family:'DM Mono',monospace;background:#EDF2F7;padding:2px 7px;border-radius:4px;font-size:12px;color:var(--teal-dk);}
.code-block{background:#1A2E35;border-radius:8px;padding:13px 16px;margin:8px 0;font-family:'DM Mono',monospace;font-size:12px;color:#90CDF4;line-height:1.7;white-space:pre-wrap;word-break:break-word;position:relative;}
.copy-code-btn{position:absolute;top:8px;right:10px;background:rgba(26,122,138,.3);border:1px solid rgba(26,122,138,.5);color:#90CDF4;border-radius:5px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.copy-code-btn:hover{background:rgba(26,122,138,.5);}
.warn-box{background:var(--red-lt);border:1px solid #FED7D7;border-radius:8px;padding:12px 16px;margin:10px 0;font-size:13px;color:var(--red);}
.warn-box strong{display:block;margin-bottom:3px;}
.note-box{background:var(--amber-lt);border:1px solid var(--amber-bd);border-radius:8px;padding:12px 16px;margin:10px 0;font-size:13px;color:var(--amber);}
.ok-box{background:var(--green-lt);border:1px solid var(--green-bd);border-radius:8px;padding:12px 16px;margin:10px 0;font-size:13px;color:var(--green);}
.ok-box strong{display:block;margin-bottom:3px;}

/* ── LEGEND ── */
.legend-bar{background:var(--dark);border-top:1px solid rgba(255,255,255,.07);padding:8px 28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#90CDF4;}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.leg-not{background:#2D4A55;border:1px solid #3D5A67;}
.leg-prog{background:var(--amber-lt);border:1px solid var(--amber-bd);}
.leg-done{background:var(--green-lt);border:1px solid var(--green-bd);}
.leg-gold{background:linear-gradient(135deg,#FDE68A,#F6D860);border:1px solid #F6D860;}
.legend-sep{width:1px;height:16px;background:rgba(255,255,255,.1);}

/* ── MAIN LAYOUT ── */
.main{padding:24px 20px 60px;max-width:1500px;margin:0 auto;}

/* ── FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.filter-bar label{font-size:13px;font-weight:600;color:var(--mid);}
.filter-btn{background:var(--white);border:1.5px solid var(--border);border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.filter-btn:hover,.filter-btn.active{background:var(--teal);border-color:var(--teal);color:#fff;}
.filter-sep{width:1px;height:22px;background:var(--border);}
.stats-chips{display:flex;gap:8px;margin-left:auto;}
.stat-chip{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;font-family:'DM Mono',monospace;}
.sc-done{background:var(--green-lt);border:1px solid var(--green-bd);color:var(--green);}
.sc-prog{background:var(--amber-lt);border:1px solid var(--amber-bd);color:var(--amber);}
.sc-not{background:var(--off);border:1px solid var(--border);color:var(--light);}

/* ── GRID WRAPPER ── */
.grid-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.grid-table{border-collapse:separate;border-spacing:0;min-width:1000px;width:100%;}

/* ── COLUMN HEADERS ── */
.col-hdr{background:var(--dark);color:#fff;font-size:11px;font-weight:700;padding:10px 8px;text-align:center;letter-spacing:.3px;white-space:nowrap;border-bottom:2px solid var(--teal);position:sticky;top:58px;z-index:100;}
.col-hdr:first-child{text-align:left;padding-left:14px;min-width:200px;border-radius:10px 0 0 0;position:sticky;left:0;z-index:150;}
.col-hdr:last-child{border-radius:0 10px 0 0;}
.col-hdr .file-num{font-size:16px;display:block;margin-bottom:2px;}
.col-hdr .file-type{font-size:9px;color:#90CDF4;display:block;font-family:'DM Mono',monospace;}
.col-hdr.f-docx .file-num{color:#90CDF4;}
.col-hdr.f-pptx .file-num{color:#FBD38D;}
.col-hdr.f-html .file-num{color:#9AE6B4;}

/* ── TOPIC HEADER CELLS ── */
.topic-hdr{background:var(--white);border-bottom:1px solid var(--border);border-right:2px solid var(--teal-lt);padding:10px 14px;font-size:13px;font-weight:700;color:var(--dark);vertical-align:middle;min-width:200px;position:sticky;left:0;z-index:50;}
.topic-hdr:hover{background:var(--teal-lt);}
.topic-num{display:inline-block;background:var(--teal);color:#fff;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:800;text-align:center;line-height:22px;margin-right:8px;flex-shrink:0;}
.topic-gold .topic-num{background:linear-gradient(135deg,#F6D860,#ECC000);}
.topic-gold{background:linear-gradient(90deg,#FFFBEB,#fff) !important;}.topic-gold .topic-hdr{background:#FFFBEB;}
.gold-star{font-size:13px;margin-left:4px;}
.topic-progress{font-size:10px;color:var(--light);font-family:'DM Mono',monospace;margin-top:3px;padding-left:30px;}

/* ── CELL ── */
td.cell{padding:4px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle;}
td.cell:last-child{border-right:none;}
tr:last-child td{border-bottom:none;}
td.cell.skip{background:repeating-linear-gradient(-45deg,#F0F4F8,#F0F4F8 4px,#E8EDF2 4px,#E8EDF2 8px);}

.cell-btn{width:100%;min-width:90px;border:none;border-radius:7px;padding:7px 6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:52px;justify-content:center;position:relative;}
.cell-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.12);}
.cell-btn:active{transform:translateY(0);}

.status-not .cell-btn{background:#2A3F4A;color:#90CDF4;border:1.5px solid #3D5A67;}
.status-not .cell-btn:hover{background:#314956;border-color:var(--teal);}
.status-prog .cell-btn{background:var(--amber-lt);color:var(--amber);border:1.5px solid var(--amber-bd);}
.status-prog .cell-btn:hover{background:#FEF3C7;}
.status-done .cell-btn{background:var(--green-lt);color:var(--green);border:1.5px solid var(--green-bd);}
.status-done .cell-btn:hover{background:#DCFCE7;}
.status-gold .cell-btn{background:linear-gradient(135deg,#FEF9C3,#FFF8DC);color:#92400E;border:1.5px solid #F6D860;box-shadow:0 0 0 1px rgba(246,216,96,.3);}
.status-gold .cell-btn:hover{background:linear-gradient(135deg,#FEF08A,#FEF9C3);}

.cell-icon{font-size:16px;line-height:1;}
.cell-label{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;opacity:.8;}
.cell-status{font-size:9px;opacity:.65;font-family:'DM Mono',monospace;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,30,40,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.modal-hdr{background:var(--dark);border-radius:16px 16px 0 0;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-title{color:#fff;font-size:16px;font-weight:800;}
.modal-sub{color:#90CDF4;font-size:12px;font-family:'DM Mono',monospace;margin-top:3px;}
.modal-close{background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.modal-close:hover{background:rgba(255,255,255,.2);}
.modal-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);flex-shrink:0;overflow-x:auto;}
.modal-tab{padding:11px 18px;font-size:13px;font-weight:600;cursor:pointer;color:var(--light);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;}
.modal-tab:hover{color:var(--dark);}
.modal-tab.active{color:var(--teal);border-bottom-color:var(--teal);}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1;}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;flex-wrap:wrap;}
.modal-footer-left{display:flex;align-items:center;gap:8px;}

/* Status buttons in modal */
.status-btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;transition:all .15s;display:flex;align-items:center;gap:5px;}
.sb-not{background:var(--off);border:1.5px solid var(--border);color:var(--mid);}
.sb-not:hover,.sb-not.active{background:#2A3F4A;border-color:#3D5A67;color:#90CDF4;}
.sb-prog{background:var(--amber-lt);border:1.5px solid var(--amber-bd);color:var(--amber);}
.sb-prog:hover,.sb-prog.active{background:#FEF3C7;box-shadow:0 0 0 2px var(--amber-bd);}
.sb-done{background:var(--green-lt);border:1.5px solid var(--green-bd);color:var(--green);}
.sb-done:hover,.sb-done.active{background:#DCFCE7;box-shadow:0 0 0 2px var(--green-bd);}

/* Prompt area */
.prompt-area{position:relative;}
.prompt-label{font-size:11px;font-weight:700;color:var(--light);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.prompt-box{background:#1A2E35;border:1px solid #2D4A55;border-radius:10px;padding:16px 18px;font-family:'DM Mono',monospace;font-size:12px;color:#90CDF4;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:360px;overflow-y:auto;user-select:all;}
.copy-btn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
.copy-btn:hover{background:var(--teal-dk);}
.copy-btn.copied{background:var(--green);}

/* Info panels in modal */
.info-panel{border-radius:8px;padding:12px 14px;margin:10px 0;border-left:4px solid;}
.info-c{background:var(--cher-c-lt);border-color:var(--cher-c);}
.info-h{background:var(--cher-h-lt);border-color:var(--cher-h);}
.info-e{background:var(--cher-e-lt);border-color:var(--cher-e);}
.info-r{background:var(--cher-r-lt);border-color:var(--cher-r);}
.info-panel .lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.info-c .lbl{color:var(--cher-c-dk);}
.info-h .lbl{color:var(--cher-h-dk);}
.info-e .lbl{color:var(--cher-e-dk);}
.info-r .lbl{color:var(--cher-r-dk);}
.info-panel p,.info-panel li{font-size:13px;color:var(--dark);line-height:1.55;}
.info-panel ul{padding-left:16px;}
.info-panel li{margin:3px 0;}

.section-hdr{font-size:14px;font-weight:800;color:var(--dark);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* Toast */
.toast{position:fixed;bottom:28px;right:28px;background:var(--dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(20px);opacity:0;transition:all .25s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.toast.show{transform:translateY(0);opacity:1;}
.toast .t-icon{color:var(--teal);margin-right:6px;}

@media(max-width:768px){
  .hdr{padding:0 14px;}
  .main{padding:14px 10px 40px;}
  .col-hdr:first-child{min-width:150px;}
  .modal{max-height:95vh;border-radius:12px;}
  .modal-hdr{border-radius:12px 12px 0 0;padding:14px 18px;}
}

/* ── TAB TOGGLE ── */
.tab-toggle{display:flex;gap:8px;margin-bottom:18px;background:var(--dark);border-radius:10px;padding:6px;width:fit-content;}
.tab-toggle-btn{background:transparent;border:none;border-radius:7px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:#90CDF4;transition:all .15s;letter-spacing:.2px;}
.tab-toggle-btn:hover{background:rgba(26,122,138,.2);}
.tab-toggle-btn.active{background:var(--teal);color:#fff;}
.tab-toggle-btn.cc-active{background:var(--cc-accent);color:#fff;}

/* ── CC COLUMN HEADERS ── */
.col-hdr.f-cc .file-num{color:#FDBA74;}
.col-hdr.f-free{border-left:2px solid #FDE68A;}
.col-hdr.f-free .file-num{color:#FDE68A;}

/* ── ASSESSMENTS SECTION ── */
.assess-section{margin-top:24px;background:var(--white);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.assess-hdr{background:var(--dark);padding:12px 18px;display:flex;align-items:center;gap:10px;}
.assess-hdr h3{font-size:14px;font-weight:800;color:#FDE68A;margin:0;}
.assess-hdr span{font-size:11px;color:#90CDF4;font-family:'DM Mono',monospace;}
.assess-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.assess-row:last-child{border-bottom:none;}
.assess-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:background .2s;}
.assess-dot.not{background:#3D5A67;}
.assess-dot.prog{background:var(--amber);}
.assess-dot.done{background:var(--green);}
.assess-label{font-size:13px;font-weight:600;color:var(--dark);flex:1;min-width:180px;}
.assess-prompt-btn{background:var(--cc-accent);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.assess-prompt-btn:hover{background:#9A4018;}
.assess-status-btns{display:flex;gap:4px;}
.assess-sb{border:none;border-radius:5px;padding:4px 9px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;}
.assess-sb-not{background:var(--off);border:1px solid var(--border);color:var(--light);}
.assess-sb-not:hover,.assess-sb-not.active{background:#2A3F4A;color:#90CDF4;border-color:#3D5A67;}
.assess-sb-prog{background:var(--amber-lt);border:1px solid var(--amber-bd);color:var(--amber);}
.assess-sb-prog:hover,.assess-sb-prog.active{background:#FEF3C7;}
.assess-sb-done{background:var(--green-lt);border:1px solid var(--green-bd);color:var(--green);}
.assess-sb-done:hover,.assess-sb-done.active{background:#DCFCE7;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo" id="hdrLogo">
    <!-- LOGO SLOT: replace src with your hi-res PNG path when ready -->
    <!-- <img id="logoImg" src="learnfromcher_logo.png" alt="learnfromcher.com" style="height:34px;width:auto;display:block;"> -->
    <span class="t">learn</span><span class="w">fromcher.com</span>
  </div>
  <div class="hdr-right">
    <span class="progress-summary" id="progressSummary">Loading…</span>
    <button class="hdr-guide-btn" onclick="openLogoGuide()">🖼 Logo Guide</button>
    <span class="hdr-badge">PRODUCTION DASHBOARD</span>
  </div>
</div>

<!-- LEGEND -->
<div class="legend-bar">
  <div class="legend-item"><div class="leg-dot leg-not"></div>Not Started</div>
  <div class="legend-sep"></div>
  <div class="legend-item"><div class="leg-dot leg-prog"></div>In Progress</div>
  <div class="legend-sep"></div>
  <div class="legend-item"><div class="leg-dot leg-done"></div>Done</div>
  <div class="legend-sep"></div>
  <div class="legend-item"><div class="leg-dot leg-gold"></div>Gold Standard (T3)</div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- TAB TOGGLE -->
  <div class="tab-toggle" id="mainTabToggle">
    <button class="tab-toggle-btn active" id="tabWeekly" onclick="switchMainTab('weekly')">📚 Weekly Tuition</button>
    <button class="tab-toggle-btn" id="tabCC" onclick="switchMainTab('cc')">⚡ Crash Course</button>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filterBarWrap">
    <label>Show:</label>
    <button class="filter-btn active" onclick="setFilter('all')">All Topics</button>
    <button class="filter-btn" onclick="setFilter('not')">Not Started</button>
    <button class="filter-btn" onclick="setFilter('prog')">In Progress</button>
    <button class="filter-btn" onclick="setFilter('done')">Done</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" style="color:var(--red);border-color:var(--red);" onclick="confirmReset()">↺ Reset All</button>
    <div class="stats-chips">
      <div class="stat-chip sc-done" id="statDone">— done</div>
      <div class="stat-chip sc-prog" id="statProg">— in progress</div>
      <div class="stat-chip sc-not" id="statNot">— not started</div>
    </div>
  </div>

const STORAGE_KEY = 'lfc_dashboard_v1';
const CC_STORAGE_KEY = 'lfc_cc_dashboard_v1';
let state = {};
let ccState = {};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) { state = {}; }

  // ── PERMANENTLY COMPLETED FILES — DO NOT CHANGE ──
  // T3 = gold standard — all files locked as gold
  for (const f of FILES) {
    if (f.type === 'skip') continue;
    state[`3_${f.n}`] = 'gold';
  }

  // F0, F1, F2, F5, F6 — completed for ALL topics T1–T13
  // These are permanently set — localStorage cannot override them downward
  const permanentDone = [0, 1, 2, 5, 6]; // file numbers using CC_FILES[n=6]=F0, FILES[n=1,2,5,6]
  const doneFileNums = [1, 2, 4, 5, 6, 7]; // weekly files done
  for (const t of TOPICS) {
    for (const fn of doneFileNums) {
      const k = `${t.n}_${fn}`;
      if (state[k] !== 'gold') state[k] = 'done';
    }
  }
  // T3 overrides everything above back to gold
  for (const f of FILES) {
    if (f.type === 'skip') continue;
    state[`3_${f.n}`] = 'gold';
  }

  // Load CC state
  try {
    const saved2 = localStorage.getItem(CC_STORAGE_KEY);
    if (saved2) ccState = JSON.parse(saved2);
  } catch(e) { ccState = {}; }

  // F0 (CC tab, ccFile n=6) done for all topics
  for (const t of TOPICS) {
    const k = `cc_${t.n}_6`;
    if (ccState[k] !== 'gold') ccState[k] = 'done';
  }
  // T3 CC files — all done (gold standard)
  for (const f of CC_FILES) {
    ccState[`cc_3_${f.n}`] = 'gold';
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function saveCCState() {
  localStorage.setItem(CC_STORAGE_KEY, JSON.stringify(ccState));
}

function getStatus(topicN, fileN) {
  const k = `${topicN}_${fileN}`;
  return state[k] || 'not';
}

function getCCStatus(topicN, fileN) {
  const k = `cc_${topicN}_${fileN}`;
  return ccState[k] || 'not';
}

function getAssessStatus(id) {
  return ccState[`assess_${id}`] || 'not';
}

function setStatus(topicN, fileN, status) {
  const k = `${topicN}_${fileN}`;
  // T3 is always gold — cannot be changed
  if (topicN === 3) { state[k] = 'gold'; saveState(); return; }
  // F0,F1,F2,F5,F6 are permanently done for all topics — cannot be downgraded
  if ([1,2,5,6].includes(fileN) && status === 'not') return;
  state[k] = status;
  saveState();
  renderGrid();
  updateStats();
  updateModalStatusBtns(topicN, fileN);
}

function setCCStatus(topicN, fileN, status) {
  const k = `cc_${topicN}_${fileN}`;
  ccState[k] = status;
  saveCCState();
  renderCCGrid();
  updateStats();
  updateCCModalStatusBtns(topicN, fileN);
}

function setAssessStatus(id, status) {
  ccState[`assess_${id}`] = status;
  saveCCState();
  renderAssessments();
  updateStats();
}

let currentFilter = 'all';
let currentMainTab = 'weekly';

function switchMainTab(tab) {
  currentMainTab = tab;
  document.getElementById('weeklyTabContent').style.display = tab === 'weekly' ? 'block' : 'none';
  document.getElementById('ccTabContent').style.display = tab === 'cc' ? 'block' : 'none';
  document.getElementById('tabWeekly').className = 'tab-toggle-btn' + (tab === 'weekly' ? ' active' : '');
  document.getElementById('tabCC').className = 'tab-toggle-btn' + (tab === 'cc' ? ' cc-active' : '');
  // Update filter bar reset label context
  document.querySelector('#filterBarWrap .filter-btn[onclick="confirmReset()"]').title =
    tab === 'weekly' ? 'Reset Weekly Tuition statuses' : 'Reset Crash Course statuses';
  updateStats();
  if (tab === 'cc') { renderCCGrid(); renderAssessments(); }
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (currentMainTab === 'weekly') renderGrid();
  else renderCCGrid();
}

function renderGrid() {
  // Column headers
  const hdrRow = document.getElementById('colHeaders');
  hdrRow.innerHTML = `<th class="col-hdr" style="border-radius:10px 0 0 0;">Topic</th>` +
    FILES.map(f => {
      if (f.type === 'skip') return `<th class="col-hdr"><span class="file-num">F3</span><span class="file-type">Pure Skip</span></th>`;
      return `<th class="col-hdr ${f.colClass}"><span class="file-num">${f.icon}</span><span class="file-type">F${f.n} ${f.short}</span></th>`;
    }).join('');

  // Body
  const tbody = document.getElementById('gridBody');
  tbody.innerHTML = '';

  for (const topic of TOPICS) {
    // Check filter
    if (currentFilter !== 'all') {
      const anyMatch = FILES.some(f => {
        if (f.type === 'skip') return false;
        const s = getStatus(topic.n, f.n);
        const mapped = s === 'gold' ? 'done' : s;
        return mapped === currentFilter;
      });
      if (!anyMatch) continue;
    }

    const isGold = topic.n === 3;
    const topicDone = FILES.filter(f=>f.type!=='skip').filter(f=>{const s=getStatus(topic.n,f.n);return s==='done'||s==='gold';}).length;
    const topicTotal = FILES.filter(f=>f.type!=='skip').length;

    const tr = document.createElement('tr');
    // Topic cell
    tr.innerHTML = `<td class="topic-hdr ${isGold?'topic-gold':''}">
      <span class="topic-num">${topic.n}</span>${topic.name}${isGold?'<span class="gold-star">⭐</span>':''}
      <div class="topic-progress">${topicDone}/${topicTotal} files complete</div>
    </td>`;

    for (const file of FILES) {
      const td = document.createElement('td');
      td.className = 'cell';
      if (file.type === 'skip') {
        td.className += ' skip';
        td.innerHTML = '';
        tr.appendChild(td);
        continue;
      }
      const status = getStatus(topic.n, file.n);
      td.className += ` status-${status}`;
      td.dataset.topic = topic.n;
      td.dataset.file = file.n;

      const labels = { not:'Not Started', prog:'In Progress', done:'Done ✓', gold:'Gold Standard ⭐' };
      td.innerHTML = `<button class="cell-btn" onclick="openModal(${topic.n},${file.n})">
        <span class="cell-icon">${file.icon}</span>
        <span class="cell-label">${file.short}</span>
        <span class="cell-status">${labels[status]||'—'}</span>
      </button>`;
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

function renderCCGrid() {

      return `<th class="col-hdr ${f.colClass}"><span class="file-num">${f.icon}</span><span class="file-type">${f.short}</span></th>`;
    }).join('');

  const tbody = document.getElementById('ccGridBody');
  tbody.innerHTML = '';

  for (const topic of TOPICS) {
    if (currentFilter !== 'all') {
      const anyMatch = CC_FILES.some(f => {
        const s = getCCStatus(topic.n, f.n);
        return s === currentFilter;
      });
      if (!anyMatch) continue;
    }

    const topicDone = CC_FILES.filter(f=>{const s=getCCStatus(topic.n,f.n);return s==='done';}).length;
    const topicTotal = CC_FILES.length;

    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="topic-hdr">
      <span class="topic-num" style="background:var(--cc-accent);">${topic.n}</span>${topic.name}
      <div class="topic-progress">${topicDone}/${topicTotal} files complete</div>
    </td>`;

    for (const ccFile of CC_FILES) {
      const td = document.createElement('td');
      td.className = 'cell';
      const status = getCCStatus(topic.n, ccFile.n);
      td.className += ` status-${status}`;
      td.dataset.cctopic = topic.n;
      td.dataset.ccfile = ccFile.n;

      const labels = { not:'Not Started', prog:'In Progress', done:'Done ✓' };
      td.innerHTML = `<button class="cell-btn" onclick="openCCModal(${topic.n},${ccFile.n})">
        <span class="cell-icon">${ccFile.icon}</span>
        <span class="cell-label">${ccFile.short}</span>
        <span class="cell-status">${labels[status]||'—'}</span>
      </button>`;
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

// ════════════════════════════════════════════════════════
// STATS
// ════════════════════════════════════════════════════════
function updateStats() {
  let done=0, prog=0, not=0, total=0;

  if (currentMainTab === 'weekly') {
    for (const t of TOPICS) {
      for (const f of FILES) {
        if (f.type==='skip') continue;
        total++;
        const s = getStatus(t.n,f.n);
        if (s==='done'||s==='gold') done++;
        else if (s==='prog') prog++;
        else not++;
      }
    }
    document.getElementById('progressSummary').textContent = `${done}/${total} weekly files`;
  } else {
    // CC tab: 91 topic cells + 6 assessment cells = 97
    for (const t of TOPICS) {
      for (const f of CC_FILES) {
        total++;
        const s = getCCStatus(t.n,f.n);
        if (s==='done') done++;
        else if (s==='prog') prog++;
        else not++;
      }
    }
    for (const a of ASSESSMENTS) {
      total++;
      const s = getAssessStatus(a.id);
      if (s==='done') done++;
      else if (s==='prog') prog++;
      else not++;
    }
    document.getElementById('progressSummary').textContent = `${done}/${total} CC files`;
  }

  document.getElementById('statDone').textContent = `${done} done`;
  document.getElementById('statProg').textContent = `${prog} in progress`;
  document.getElementById('statNot').textContent = `${not} not started`;
}

function updateModalStatusBtns(topicN, fileN) {

function openAssessModal(assessId) {
  const assess = ASSESSMENTS.find(a=>a.id===assessId);
  currentCCTopic = null;
  currentCCFile = null;
  window._ccModalActive = false;

  document.getElementById('modalTitle').textContent = assess.label;
  document.getElementById('modalSub').textContent = `HTML · SEAB 2026 Combined Chem · Crash Course Assessment`;
  document.getElementById('modalTabs').innerHTML = `<button class="modal-tab active">📋 Build Prompt</button>`;

  const prompt = generateAssessPrompt(assess);
  document.getElementById('modalBody').innerHTML = `
    <div class="prompt-label">Ready-to-paste build prompt for Claude</div>
    <div class="prompt-area">
      <div class="prompt-box" id="promptText">${escHtml(prompt)}</div>
    </div>`;

  const status = getAssessStatus(assessId);
  document.getElementById('statusBtns').innerHTML = `
    <span style="font-size:12px;color:var(--light);margin-right:4px;">Status:</span>
    <button class="status-btn sb-not ${status==='not'?'active':''}" onclick="setAssessStatus('${assessId}','not');updateAssessModalBtns('${assessId}')">○ Not Started</button>
    <button class="status-btn sb-prog ${status==='prog'?'active':''}" onclick="setAssessStatus('${assessId}','prog');updateAssessModalBtns('${assessId}')">◑ In Progress</button>
    <button class="status-btn sb-done ${status==='done'?'active':''}" onclick="setAssessStatus('${assessId}','done');updateAssessModalBtns('${assessId}')">✓ Done</button>`;

  document.getElementById('copyBtn').style.display = 'flex';
  document.getElementById('modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function updateAssessModalBtns(assessId) {
  const status = getAssessStatus(assessId);
  const btns = document.getElementById('statusBtns');
  btns.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  if (status==='not') btns.querySelectorAll('.sb-not').forEach(b=>b.classList.add('active'));
  if (status==='prog') btns.querySelectorAll('.sb-prog').forEach(b=>b.classList.add('active'));
  if (status==='done') btns.querySelectorAll('.sb-done').forEach(b=>b.classList.add('active'));
}

function copyPrompt() {
  const txt = document.getElementById('promptText').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '✅ Copied!';
    showToast('✅ Prompt copied to clipboard');
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='📋 Copy Prompt';},2000);
  });
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = '';
}

// UTILS
// ════════════════════════════════════════════════════════
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = `<span class="t-icon">✓</span>${msg}`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function confirmReset() {
  const label = currentMainTab === 'weekly' ? 'Weekly Tuition' : 'Crash Course';
  if (confirm(`Reset ALL ${label} statuses to Not Started?${currentMainTab==='weekly'?' (Topic 3 gold standard will be preserved.)':''}`)) {
    if (currentMainTab === 'weekly') {
      state = {};
      for (const f of FILES) {
        if (f.type==='skip') continue;
        state[`3_${f.n}`] = 'gold';
      }
      saveState();
      renderGrid();
    } else {
      ccState = {};
      saveCCState();
      renderCCGrid();
      renderAssessments();
    }
    updateStats();
    showToast('↺ All statuses reset');
  }
}
